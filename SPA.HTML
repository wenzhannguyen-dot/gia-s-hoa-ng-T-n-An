  ["刮胡子","guā hú zi","Cạo râu","他在刮胡子。","Tā zài guā hú zi.","Anh ấy đang cạo râu."],

var ICO='<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
var tb=document.getElementById('tb');
rows.forEach(function(r,i){

  tr.innerHTML='<td><div class="stt">'+(i+1)+'</div></td>'+

    '<td class="py">'+r[1]+'</td>'+

    '<td class="ex"><span class="ex-cn">'+r[3]+'</span> <span class="ex-py">('+r[4]+')</span> <span class="ex-vi">'+r[5]+'</span></td>';
  tb.appendChild(tr);
});

/* ---- TTS ---- */
var SS=window.speechSynthesis;
var cur=null;
var curBtn=null;
var zhV=null;
var ready=false;

function pickVoice(){
  if(!SS) return;
  var vv=SS.getVoices();
  if(!vv||vv.length===0) return;
  var pref=['zh-CN','zh_CN','cmn-Hans-CN','zh-TW','zh-HK','zh'];
  for(var p=0;p<pref.length;p++){
    for(var v=0;v<vv.length;v++){
      if(vv[v].lang===pref[p]||vv[v].lang.startsWith(pref[p])){
        zhV=vv[v]; ready=true; return;
      }
    }
  }
  // không tìm thấy giọng zh nhưng vẫn thử phát với lang='zh-CN'
  ready=true;
}

if(SS){
  pickVoice();
  SS.onvoiceschanged=pickVoice;
  setTimeout(pickVoice,300);
  setTimeout(pickVoice,1000);
  setTimeout(pickVoice,2000);
}

function say(btn,text){
  if(!SS){ alert('Trình duyệt không hỗ trợ TTS. Dùng Chrome hoặc Safari.'); return; }

  // Nếu đang phát cùng từ → dừng
  if(curBtn===btn){
    SS.cancel();
    btn.classList.remove('on');
    curBtn=null; cur=null;
    return;
  }
  // Dừng từ trước
  SS.cancel();
  if(curBtn){ curBtn.classList.remove('on'); }

  // Gọi lại pickVoice lần cuối (iOS gesture unlock)
  pickVoice();

  var u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN';
  u.rate=0.85;
  u.pitch=1.0;
  u.volume=1.0;
  if(zhV) u.voice=zhV;

  u.onstart=function(){ btn.classList.add('on'); curBtn=btn; };
  u.onend=function(){ btn.classList.remove('on'); if(curBtn===btn){curBtn=null;} };
  u.onerror=function(e){ btn.classList.remove('on'); if(curBtn===btn){curBtn=null;} };

  cur=u;
  // setTimeout 100ms: bắt buộc trên iOS Safari để không bị bỏ qua
  setTimeout(function(){ SS.speak(u); }, 100);
}
</script>
